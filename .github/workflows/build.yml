name: Build JYJH NoCD NoEnergy Dylib

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Hello from GitHub Actions!"
      
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq git cmake ninja-build python3 libssl-dev zlib1g-dev libxml2-dev uuid-dev

      - name: Build cctools-port
        run: |
          git clone https://github.com/tpoechtrager/cctools-port.git --depth 1
          cd cctools-port
          ./usage_examples/ios_toolchain/build.sh /tmp/ios arm64 15.0
          ls /tmp/ios/bin/

      - name: Build stub substrate
        run: |
          mkdir -p /tmp/inc
          cat > /tmp/inc/substrate.h << 'H'
          #ifndef SUBSTRATE_H_
          #define SUBSTRATE_H_
          void MSHookFunction(void *symbol, void *replace, void **result);
          void *MSFindSymbol(void *image, const char *name);
          #endif
          H
          
          cat > /tmp/stub.c << 'S'
          void MSHookFunction(void *symbol, void *replace, void **result) {}
          void *MSFindSymbol(void *image, const char *name) { return (void*)0; }
          S
          
          /tmp/ios/bin/clang \
            -arch arm64 -miphoneos-version-min=15.0 \
            -isysroot /tmp/ios/SDK/iPhoneOS15.0.sdk \
            -dynamiclib -o /tmp/libsubstrate.dylib /tmp/stub.c

      - name: Build tweak
        run: |
          /tmp/ios/bin/clang \
            -arch arm64 \
            -miphoneos-version-min=15.0 \
            -isysroot /tmp/ios/SDK/iPhoneOS15.0.sdk \
            -fobjc-arc \
            -dynamiclib \
            -framework Foundation \
            -I/tmp/inc -L/tmp -lsubstrate \
            -install_name @executable_path/JYJH_NoCDNoEnergy.dylib \
            -o JYJH_NoCDNoEnergy.dylib \
            JYJH_NoCDNoEnergy.xm

      - name: Sign and package
        run: |
          /tmp/ios/bin/ldid -S JYJH_NoCDNoEnergy.dylib
          echo '{ Filter = { Bundles = ( "com.jyjh.whwb" ); }; }' > JYJH_NoCDNoEnergy.plist
          mkdir -p output
          cp JYJH_NoCDNoEnergy.dylib JYJH_NoCDNoEnergy.plist output/
          file output/JYJH_NoCDNoEnergy.dylib
          ls -lh output/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: JYJH_NoCDNoEnergy-dylib
          path: output/

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          files: output/*
          body: |
            ## 剑影江湖 v1.8.1 无CD无能量技能插件
            
            ### 功能
            - ✅ 无CD: 所有技能无冷却
            - ✅ 无能量: 大招无需怒气/能量
            
            ### 部署 (iOS无根越狱)
            ```bash
            scp JYJH_NoCDNoEnergy.dylib root@IP:/var/jb/usr/lib/TweakInject/
            scp JYJH_NoCDNoEnergy.plist root@IP:/var/jb/usr/lib/TweakInject/
            ```
            
            ⚠️ 仅适用于 v1.8.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}