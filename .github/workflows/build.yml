name: Build JYJH NoCD NoEnergy Dylib

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq git cmake ninja-build python3 \
            libssl-dev zlib1g-dev libxml2-dev uuid-dev libbsd-dev \
            autoconf automake libtool pkg-config clang libc++-dev libc++abi-dev \
            xz-utils

      - name: Get iOS SDK
        run: |
          # Clone pre-extracted iOS SDK from theos/sdks
          git clone https://github.com/theos/sdks.git --depth 1 /tmp/sdks
          ls /tmp/sdks/
          
          # Pack SDK into tar.xz (cctools-port build.sh requires this format)
          cd /tmp/sdks
          tar -cJf /tmp/iPhoneOS15.6.sdk.tar.xz iPhoneOS15.6.sdk
          ls -lh /tmp/iPhoneOS15.6.sdk.tar.xz

      - name: Build cctools-port toolchain
        run: |
          git clone https://github.com/tpoechtrager/cctools-port.git --depth 1 /tmp/cctools
          
          # build.sh usage: ./build.sh <SDK.tar.xz> <target_cpu>
          # It expects the SDK as a tar.xz archive
          cd /tmp/cctools/usage_examples/ios_toolchain
          
          ./build.sh /tmp/iPhoneOS15.6.sdk.tar.xz arm64
          
          # Verify toolchain
          ls /tmp/cctools/usage_examples/ios_toolchain/target/bin/ || true
          find /tmp/cctools -name "clang" -type f | head -5
          find /tmp/cctools -name "ldid" -type f | head -5

      - name: Build stub libsubstrate
        run: |
          # Find toolchain paths
          CLANG=$(find /tmp/cctools -name "clang" -type f | head -1)
          SDK=$(find /tmp/cctools -name "iPhoneOS*.sdk" -type d | head -1)
          echo "clang: $CLANG"
          echo "SDK: $SDK"
          
          # Create substrate header
          mkdir -p /tmp/inc
          cat > /tmp/inc/substrate.h << 'H'
          #ifndef SUBSTRATE_H_
          #define SUBSTRATE_H_
          void MSHookFunction(void *symbol, void *replace, void **result);
          void *MSFindSymbol(void *image, const char *name);
          #endif
          H
          
          # Stub implementation
          cat > /tmp/stub.c << 'S'
          void MSHookFunction(void *symbol, void *replace, void **result) {}
          void *MSFindSymbol(void *image, const char *name) { return (void*)0; }
          S
          
          # Build stub substrate
          $CLANG \
            -arch arm64 -miphoneos-version-min=15.0 \
            -isysroot "$SDK" \
            -dynamiclib -o /tmp/libsubstrate.dylib \
            /tmp/stub.c

      - name: Build tweak dylib
        run: |
          CLANG=$(find /tmp/cctools -name "clang" -type f | head -1)
          SDK=$(find /tmp/cctools -name "iPhoneOS*.sdk" -type d | head -1)
          
          $CLANG \
            -arch arm64 \
            -miphoneos-version-min=15.0 \
            -isysroot "$SDK" \
            -fobjc-arc \
            -dynamiclib \
            -framework Foundation \
            -I/tmp/inc -L/tmp -lsubstrate \
            -install_name @executable_path/JYJH_NoCDNoEnergy.dylib \
            -o JYJH_NoCDNoEnergy.dylib \
            JYJH_NoCDNoEnergy.xm

      - name: Sign and package
        run: |
          LDID=$(find /tmp/cctools -name "ldid" -type f | head -1)
          [ -n "$LDID" ] && $LDID -S JYJH_NoCDNoEnergy.dylib
          
          echo '{ Filter = { Bundles = ( "com.jyjh.whwb" ); }; }' > JYJH_NoCDNoEnergy.plist
          mkdir -p output
          cp JYJH_NoCDNoEnergy.dylib JYJH_NoCDNoEnergy.plist output/
          file output/JYJH_NoCDNoEnergy.dylib
          ls -lh output/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: JYJH_NoCDNoEnergy-dylib
          path: output/

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          files: output/*
          body: |
            ## 剑影江湖 v1.8.1 无CD无能量技能插件
            - ✅ 无CD + 无能量
            - 适配 iPhone 13 Pro Max / iOS 15.6 / 无根越狱
            ⚠️ 仅适用于 v1.8.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}