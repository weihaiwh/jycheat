name: Build JYJH NoCDNoEnergy Dylib (v26.0)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq git cmake ninja-build python3 \
            libssl-dev zlib1g-dev libxml2-dev uuid-dev libbsd-dev \
            autoconf automake libtool pkg-config clang libc++-dev libc++abi-dev xz-utils

      - name: Get iOS SDK
        run: |
          git clone https://github.com/theos/sdks.git --depth 1 /tmp/sdks
          cd /tmp/sdks
          tar -cJf /tmp/iPhoneOS15.6.sdk.tar.xz iPhoneOS15.6.sdk
          ls -lh /tmp/iPhoneOS15.6.sdk.tar.xz

      - name: Build cctools-port toolchain
        run: |
          git clone https://github.com/tpoechtrager/cctools-port.git --depth 1 /tmp/cctools
          cd /tmp/cctools/usage_examples/ios_toolchain
          ./build.sh /tmp/iPhoneOS15.6.sdk.tar.xz arm64

      - name: Build Dobby static library for iOS ARM64
        run: |
          TOOLCHAIN=/tmp/cctools/usage_examples/ios_toolchain/target
          export PATH="$TOOLCHAIN/bin:$PATH"
          SDK="$TOOLCHAIN/SDK/iPhoneOS15.6.sdk"
          
          git clone https://github.com/jmpews/Dobby.git --depth 1 /tmp/dobby
          
          cat > /tmp/ios-toolchain.cmake << 'EOF'
          set(CMAKE_SYSTEM_NAME Darwin)
          set(CMAKE_SYSTEM_PROCESSOR arm64)
          set(CMAKE_C_COMPILER arm-apple-darwin11-clang)
          set(CMAKE_CXX_COMPILER arm-apple-darwin11-clang++)
          set(CMAKE_FIND_ROOT_PATH MODE_PROGRAM NEVER)
          set(CMAKE_FIND_ROOT_PATH MODE_LIBRARY ONLY)
          set(CMAKE_FIND_ROOT_PATH MODE_INCLUDE ONLY)
          EOF
          
          mkdir -p /tmp/dobby/build && cd /tmp/dobby/build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=/tmp/ios-toolchain.cmake \
            -DCMAKE_C_FLAGS="-arch arm64 -miphoneos-version-min=15.0 -isysroot $SDK" \
            -DCMAKE_CXX_FLAGS="-arch arm64 -miphoneos-version-min=15.0 -isysroot $SDK" \
            -DDOBBY_DEBUG=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -G Ninja
          
          ninja -j$(nproc)
          
          find /tmp/dobby/build -name "*.a" -ls
          echo "DOBBY_LIB=$(find /tmp/dobby/build -name 'libdobby.a' | head -1)" >> $GITHUB_ENV

      - name: Build tweak dylib
        run: |
          TOOLCHAIN=/tmp/cctools/usage_examples/ios_toolchain/target
          export PATH="$TOOLCHAIN/bin:$PATH"
          SDK="$TOOLCHAIN/SDK/iPhoneOS15.6.sdk"
          DOBBY_LIB="${DOBBY_LIB:-/tmp/dobby/build/libdobby.a}"
          
          echo "=== Build Environment ==="
          echo "SDK: $SDK"
          echo "DOBBY_LIB: $DOBBY_LIB"
          which arm-apple-darwin11-clang || { echo "ERROR: clang not found!"; ls "$TOOLCHAIN/bin/" | head -20; exit 1; }
          ls -la "$DOBBY_LIB" || { echo "ERROR: Dobby lib not found!"; exit 1; }
          echo "=== Source file ==="
          ls -la JYJH_NoCDNoEnergy_v26.m
          head -5 JYJH_NoCDNoEnergy_v26.m
          
          echo "=== Compiling ==="
          arm-apple-darwin11-clang \
            -arch arm64 \
            -miphoneos-version-min=15.0 \
            -isysroot "$SDK" \
            -fobjc-arc \
            -I. \
            -c JYJH_NoCDNoEnergy_v26.m \
            -o JYJH_NoCDNoEnergy.o
          
          echo "Compile OK, linking with Dobby..."
          
          arm-apple-darwin11-ld \
            -arch arm64 \
            -iphoneos_version_min 15.0 \
            -syslibroot "$SDK" \
            -dynamic \
            -dylib \
            -framework Foundation \
            -framework UIKit \
            -framework CoreGraphics \
            -framework CoreFoundation \
            -lSystem \
            -lobjc \
            -lc++ \
            -objc_abi_version 2 \
            -install_name @executable_path/JYJH_NoCDNoEnergy.dylib \
            -o JYJH_NoCDNoEnergy.dylib \
            JYJH_NoCDNoEnergy.o \
            "$DOBBY_LIB"
          
          echo "Build SUCCESS!"
          
          file JYJH_NoCDNoEnergy.dylib
          ls -lh JYJH_NoCDNoEnergy.dylib

      - name: Sign and package
        run: |
          LDID=$(find /tmp/cctools -name "ldid" -type f | head -1)
          [ -n "$LDID" ] && $LDID -S JYJH_NoCDNoEnergy.dylib
          
          echo '{ Filter = { Bundles = ( "com.jyjh.whwb" ); }; }' > JYJH_NoCDNoEnergy.plist
          mkdir -p output
          cp JYJH_NoCDNoEnergy.dylib JYJH_NoCDNoEnergy.plist output/
          file output/JYJH_NoCDNoEnergy.dylib
          ls -lh output/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: JYJH-NoCDNoEnergy-dylib-v26.0
          path: output/

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v26.0
          files: output/*
          body: |
            ## 剑影江湖 v26.0 - OnUpdate修改IsAnger + SetInputOpt/DoConfirmOpt
            - **核心变更**: Hook OnUpdate直接修改IsAnger字段 + SetInputOpt/DoConfirmOpt
            - v25发现: get_IsAnger是泛型共享地址无法单独hook, OnAngerChange从未被调用
            - v26: 在OnUpdate中直接修改<IsAnger>k__BackingField(0x351)=NO
            - 同时hook SetInputOpt/DoConfirmOpt监控UseExSkill(20014)输入路径
            - SetInputOpt: 当optType=20014时记录日志
            - DoConfirmOpt: 监控大招确认流程
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
