name: Build JYJH NoCD NoEnergy Dylib

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify iOS SDK
        run: |
          SDK=$(xcrun --show-sdk-path --sdk iphoneos)
          echo "iOS SDK: $SDK"
          ls "$SDK/System/Library/Frameworks/Foundation.framework/Headers/" | head -5
          xcrun -sdk iphoneos --find clang
          xcodebuild -version

      - name: Build stub libsubstrate (for linking only)
        run: |
          # Create substrate header
          mkdir -p /tmp/substrate
          cat > /tmp/substrate/substrate.h << 'EOF'
          #ifndef SUBSTRATE_H_
          #define SUBSTRATE_H_
          #include <mach-o/dyld.h>
          void MSHookFunction(void *symbol, void *replace, void **result);
          void *MSFindSymbol(void *image, const char *name);
          #endif
          EOF

          # Create stub implementation (only used at link time;
          # at runtime the real Cydia Substrate is loaded on the jailbroken device)
          cat > /tmp/substrate/stub.c << 'EOF'
          void MSHookFunction(void *symbol, void *replace, void **result) {}
          void *MSFindSymbol(void *image, const char *name) { return (void*)0; }
          EOF

          # Cross-compile stub for iOS arm64
          xcrun -sdk iphoneos clang \
            -arch arm64 \
            -miphoneos-version-min=15.0 \
            -dynamiclib \
            -o /tmp/substrate/libsubstrate.dylib \
            /tmp/substrate/stub.c

          file /tmp/substrate/libsubstrate.dylib
          echo "Stub substrate built OK"

      - name: Build dylib
        run: |
          # Cross-compile tweak for iOS arm64
          xcrun -sdk iphoneos clang \
            -arch arm64 \
            -miphoneos-version-min=15.0 \
            -fobjc-arc \
            -Wno-deprecated-declarations \
            -dynamiclib \
            -framework Foundation \
            -I/tmp/substrate \
            -L/tmp/substrate \
            -lsubstrate \
            -install_name /usr/lib/JYJH_NoCDNoEnergy.dylib \
            -o JYJH_NoCDNoEnergy.dylib \
            JYJH_NoCDNoEnergy.xm

          echo "=== Build result ==="
          file JYJH_NoCDNoEnergy.dylib
          otool -lh JYJH_NoCDNoEnergy.dylib | grep -E "BUILD_VERSION|VERSION_MIN|platform"
          nm -g JYJH_NoCDNoEnergy.dylib | grep -i "MSHook\|hook_"

      - name: Sign and package
        run: |
          # Pseudo-sign with ldid (for jailbroken iOS)
          brew install ldid
          ldid -S JYJH_NoCDNoEnergy.dylib

          # Create plist filter
          cat > JYJH_NoCDNoEnergy.plist << 'EOF'
          { Filter = { Bundles = ( "com.jyjh.whwb" ); }; }
          EOF

          mkdir -p output
          cp JYJH_NoCDNoEnergy.dylib output/
          cp JYJH_NoCDNoEnergy.plist output/

          echo "=== Final output ==="
          ls -lh output/
          file output/JYJH_NoCDNoEnergy.dylib

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: JYJH_NoCDNoEnergy-dylib
          path: output/
          retention-days: 90

      - name: Auto release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          files: output/*
          body: |
            ## 剑影江湖 v1.8.1 无CD无能量技能插件

            ### 功能
            - ✅ 无CD: 所有技能无冷却，连续释放
            - ✅ 无能量: 大招无需怒气/能量

            ### 部署 (iOS无根越狱)
            ```bash
            scp JYJH_NoCDNoEnergy.dylib root@设备IP:/var/jb/usr/lib/TweakInject/
            scp JYJH_NoCDNoEnergy.plist root@设备IP:/var/jb/usr/lib/TweakInject/
            # 重启游戏
            ```

            ### 适配
            | 项目 | 值 |
            |------|-----|
            | 设备 | iPhone 13 Pro Max |
            | 系统 | iOS 15.6 |
            | 越狱 | 无根越狱 (Dopamine/Palera1n) |
            | 游戏版本 | 1.8.1 |

            ⚠️ 仅适用于 v1.8.1，游戏更新后偏移地址需重新确认
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}