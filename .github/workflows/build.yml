name: Build JYJH NoCD NoEnergy Dylib

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq git cmake ninja-build python3 \
            libssl-dev zlib1g-dev libxml2-dev uuid-dev libbsd-dev \
            autoconf automake libtool pkg-config clang libc++-dev libc++abi-dev xz-utils

      - name: Get iOS SDK
        run: |
          git clone https://github.com/theos/sdks.git --depth 1 /tmp/sdks
          cd /tmp/sdks
          tar -cJf /tmp/iPhoneOS15.6.sdk.tar.xz iPhoneOS15.6.sdk
          ls -lh /tmp/iPhoneOS15.6.sdk.tar.xz

      - name: Build cctools-port toolchain
        run: |
          git clone https://github.com/tpoechtrager/cctools-port.git --depth 1 /tmp/cctools
          cd /tmp/cctools/usage_examples/ios_toolchain
          ./build.sh /tmp/iPhoneOS15.6.sdk.tar.xz arm64

      - name: Build tweak dylib
        run: |
          TOOLCHAIN=/tmp/cctools/usage_examples/ios_toolchain/target
          export PATH="$TOOLCHAIN/bin:$PATH"
          SDK="$TOOLCHAIN/SDK/iPhoneOS15.6.sdk"
          
          echo "SDK: $SDK"
          
          # Verify system libraries exist in SDK
          echo "=== Checking system libraries ==="
          ls -la "$SDK/usr/lib/libSystem.dylib" 2>/dev/null || echo "libSystem.dylib NOT FOUND"
          ls -la "$SDK/usr/lib/libobjc.dylib" 2>/dev/null || echo "libobjc.dylib NOT FOUND"
          ls "$SDK/usr/lib/" | head -30
          
          # Compile .m -> .o
          arm-apple-darwin11-clang \
            -arch arm64 \
            -miphoneos-version-min=15.0 \
            -isysroot "$SDK" \
            -fobjc-arc \
            -c JYJH_NoCDNoEnergy.m \
            -o JYJH_NoCDNoEnergy.o
          
          echo "Compile OK, linking..."
          
          # Link with cctools ld directly (bypass clang which invokes wrong host ld)
          # Must explicitly add system libraries that Apple ld auto-links:
          #   -lSystem (libc, libdispatch, libdyld, libmacho, etc.)
          #   -lobjc (Objective-C runtime, blocks runtime)
          #   -lc++ (C++ standard library, needed by Foundation)
          arm-apple-darwin11-ld \
            -arch arm64 \
            -iphoneos_version_min 15.0 \
            -syslibroot "$SDK" \
            -dynamic \
            -dylib \
            -framework Foundation \
            -framework UIKit \
            -framework CoreGraphics \
            -framework CoreFoundation \
            -lSystem \
            -lobjc \
            -lc++ \
            -objc_abi_version 2 \
            -install_name @executable_path/JYJH_NoCDNoEnergy.dylib \
            -o JYJH_NoCDNoEnergy.dylib \
            JYJH_NoCDNoEnergy.o

      - name: Sign and package
        run: |
          LDID=$(find /tmp/cctools -name "ldid" -type f | head -1)
          [ -n "$LDID" ] && $LDID -S JYJH_NoCDNoEnergy.dylib
          
          echo '{ Filter = { Bundles = ( "com.jyjh.whwb" ); }; }' > JYJH_NoCDNoEnergy.plist
          mkdir -p output
          cp JYJH_NoCDNoEnergy.dylib JYJH_NoCDNoEnergy.plist output/
          file output/JYJH_NoCDNoEnergy.dylib
          ls -lh output/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: JYJH_NoCDNoEnergy-dylib
          path: output/

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v9.1
          files: output/*
          body: |
            ## 剑影江湖 v9.1 无CD无能量技能插件
            - ✅ 无CD + 无能量 + 伤害上限滑条
            - v9.1: 修复进游戏后闪退 - 延迟8秒等场景加载完再patch
            - 防止重复patch, toggle加状态检查
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}