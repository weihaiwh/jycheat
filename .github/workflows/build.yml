name: Build JYJH NoCD NoEnergy Dylib

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq git cmake ninja-build python3 \
            libssl-dev zlib1g-dev libxml2-dev uuid-dev libbsd-dev \
            autoconf automake libtool pkg-config

      - name: Build cctools-port with SDK
        run: |
          # Clone cctools-port
          git clone https://github.com/tpoechtrager/cctools-port.git --depth 1 /tmp/cctools

          # The build.sh script needs an Xcode .dmg to extract the SDK
          # We use the iOS SDK from a separate repo that provides pre-extracted SDKs
          # Download iOS 15.0 SDK from xybp1234/iOS-SDKs (community maintained)
          git clone https://github.com/xybp1234/iOS-SDKs.git --depth 1 /tmp/sdks

          # Find the iPhoneOS SDK
          ls /tmp/sdks/
          SDK_PATH=$(find /tmp/sdks -name "iPhoneOS*" -type d | head -1)
          echo "Found SDK: $SDK_PATH"

          if [ -z "$SDK_PATH" ]; then
            echo "ERROR: No iPhoneOS SDK found!"
            ls -R /tmp/sdks/ | head -30
            exit 1
          fi

          # Build cctools-port toolchain manually
          cd /tmp/cctools

          # Set target
          TARGET=arm64-apple-darwin14
          PREFIX=/tmp/ios-toolchain

          # Build ld64
          cd ld64
          mkdir -p build && cd build
          cmake .. -DCMAKE_INSTALL_PREFIX=$PREFIX \
            -DCMAKE_OSX_SYSROOT=$SDK_PATH \
            -DTARGET_ARCH=arm64 \
            -DLLVM_SUPPORT=OFF
          make -j$(nproc) && make install
          cd ../..

          # Build cctools (as, ar, nm, etc)
          cd cctools
          mkdir -p build && cd build
          ../configure --target=$TARGET --prefix=$PREFIX
          make -j$(nproc) && make install
          cd ../..

          # Install SDK
          mkdir -p $PREFIX/SDK
          cp -r $SDK_PATH $PREFIX/SDK/

          echo "Toolchain built"
          ls $PREFIX/bin/ 2>/dev/null || echo "No bin dir"

      - name: Fallback - use prebuilt toolchain
        if: failure()
        run: |
          echo "CCTools build failed, trying prebuilt toolchain..."
          
          # Try downloading a prebuilt iOS toolchain
          # Option 1: from theos/devcontainers
          mkdir -p /tmp/ios-toolchain
          
          # Use Theos's prebuilt toolchain
          git clone --recursive https://github.com/theos/theos.git /tmp/theos
          ls /tmp/theos/toolchain/linux/iphone/
          
          if [ -d "/tmp/theos/toolchain/linux/iphone" ]; then
            cp -r /tmp/theos/toolchain/linux/iphone/* /tmp/ios-toolchain/
            echo "Theos toolchain copied"
          fi
          
          # Get iOS SDK
          git clone https://github.com/xybp1234/iOS-SDKs.git --depth 1 /tmp/sdks
          SDK_PATH=$(find /tmp/sdks -name "iPhoneOS*" -type d | head -1)
          mkdir -p /tmp/ios-toolchain/SDK
          cp -r "$SDK_PATH" /tmp/ios-toolchain/SDK/
          
          ls /tmp/ios-toolchain/bin/ || echo "No bin"
          ls /tmp/ios-toolchain/SDK/ || echo "No SDK"

      - name: Build stub substrate
        run: |
          mkdir -p /tmp/inc
          cat > /tmp/inc/substrate.h << 'H'
          #ifndef SUBSTRATE_H_
          #define SUBSTRATE_H_
          void MSHookFunction(void *symbol, void *replace, void **result);
          void *MSFindSymbol(void *image, const char *name);
          #endif
          H
          
          cat > /tmp/stub.c << 'S'
          void MSHookFunction(void *symbol, void *replace, void **result) {}
          void *MSFindSymbol(void *image, const char *name) { return (void*)0; }
          S

      - name: Build tweak
        run: |
          # Find clang in toolchain
          CLANG=$(find /tmp/ios-toolchain -name "clang" -type f | head -1)
          SDK=$(find /tmp/ios-toolchain -name "iPhoneOS*" -type d | head -1)
          
          if [ -z "$CLANG" ]; then
            echo "ERROR: No clang found in toolchain!"
            find /tmp/ios-toolchain -type f | head -20
            exit 1
          fi
          
          echo "Using clang: $CLANG"
          echo "Using SDK: $SDK"
          
          # Build stub substrate
          $CLANG \
            -arch arm64 -miphoneos-version-min=15.0 \
            -isysroot "$SDK" \
            -dynamiclib -o /tmp/libsubstrate.dylib /tmp/stub.c
          
          # Build tweak
          $CLANG \
            -arch arm64 \
            -miphoneos-version-min=15.0 \
            -isysroot "$SDK" \
            -fobjc-arc \
            -dynamiclib \
            -framework Foundation \
            -I/tmp/inc -L/tmp -lsubstrate \
            -install_name @executable_path/JYJH_NoCDNoEnergy.dylib \
            -o JYJH_NoCDNoEnergy.dylib \
            JYJH_NoCDNoEnergy.xm

      - name: Sign and package
        run: |
          LDID=$(find /tmp -name "ldid" -type f | head -1)
          if [ -n "$LDID" ]; then
            $LDID -S JYJH_NoCDNoEnergy.dylib
          else
            echo "ldid not found, skipping pseudo-sign"
          fi
          
          echo '{ Filter = { Bundles = ( "com.jyjh.whwb" ); }; }' > JYJH_NoCDNoEnergy.plist
          mkdir -p output
          cp JYJH_NoCDNoEnergy.dylib JYJH_NoCDNoEnergy.plist output/
          file output/JYJH_NoCDNoEnergy.dylib
          ls -lh output/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: JYJH_NoCDNoEnergy-dylib
          path: output/

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          files: output/*
          body: |
            ## 剑影江湖 v1.8.1 无CD无能量技能插件
            - ✅ 无CD + 无能量
            - 适配 iPhone 13 Pro Max / iOS 15.6 / 无根越狱
            ⚠️ 仅适用于 v1.8.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}