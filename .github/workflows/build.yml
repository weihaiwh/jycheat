name: Build JYJH AntiDetect Dylib (v4.0)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq git cmake ninja-build python3 \
            libssl-dev zlib1g-dev libxml2-dev uuid-dev libbsd-dev \
            autoconf automake libtool pkg-config clang libc++-dev libc++abi-dev xz-utils

      - name: Get iOS SDK
        run: |
          git clone https://github.com/theos/sdks.git --depth 1 /tmp/sdks
          cd /tmp/sdks
          tar -cJf /tmp/iPhoneOS15.6.sdk.tar.xz iPhoneOS15.6.sdk
          ls -lh /tmp/iPhoneOS15.6.sdk.tar.xz

      - name: Build cctools-port toolchain
        run: |
          git clone https://github.com/tpoechtrager/cctools-port.git --depth 1 /tmp/cctools
          cd /tmp/cctools/usage_examples/ios_toolchain
          ./build.sh /tmp/iPhoneOS15.6.sdk.tar.xz arm64

      - name: Build AntiDetect v4.0 dylib
        run: |
          TOOLCHAIN=/tmp/cctools/usage_examples/ios_toolchain/target
          export PATH="$TOOLCHAIN/bin:$PATH"
          SDK="$TOOLCHAIN/SDK/iPhoneOS15.6.sdk"
          
          echo "=== Build Environment ==="
          which arm-apple-darwin11-clang || { echo "ERROR: clang not found!"; exit 1; }
          ls -la JYJH_AntiDetect_v4.m
          
          echo "=== Compiling ==="
          arm-apple-darwin11-clang \
            -arch arm64 \
            -miphoneos-version-min=15.0 \
            -isysroot "$SDK" \
            -fobjc-arc \
            -I. \
            -c JYJH_AntiDetect_v4.m \
            -o JYJH_AntiDetect.o
          
          echo "Compile OK, linking..."
          
          arm-apple-darwin11-ld \
            -arch arm64 \
            -iphoneos_version_min 15.0 \
            -syslibroot "$SDK" \
            -dynamic \
            -dylib \
            -framework Foundation \
            -framework UIKit \
            -framework CoreGraphics \
            -framework CoreFoundation \
            -lSystem \
            -lobjc \
            -lc++ \
            -objc_abi_version 2 \
            -install_name @executable_path/JYJH_AntiDetect.dylib \
            -o JYJH_AntiDetect.dylib \
            JYJH_AntiDetect.o
          
          echo "Build SUCCESS!"
          file JYJH_AntiDetect.dylib
          ls -lh JYJH_AntiDetect.dylib

      - name: Sign and package
        run: |
          LDID=$(find /tmp/cctools -name "ldid" -type f | head -1)
          [ -n "$LDID" ] && $LDID -S JYJH_AntiDetect.dylib
          
          echo '{ Filter = { Bundles = ( "com.jyjh.whwb" ); }; }' > JYJH_AntiDetect.plist
          mkdir -p output
          cp JYJH_AntiDetect.dylib JYJH_AntiDetect.plist output/
          ls -lh output/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: JYJH-AntiDetect-dylib-v4.0
          path: output/

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: anti-v4.0
          files: output/*
          body: |
            ## 剑影江湖 反检测 v4.0 - fishhook + MethodInfo
            - **v4.0**: 双层防护，native层fishhook + IL2CPP层MethodInfo替换
            - **fishhook层** (修改GOT，PPL不管):
              - stat/lstat/access/fopen/open: 隐藏越狱文件路径
              - getenv: 清除DYLD_INSERT_LIBRARIES等注入环境变量
            - **MethodInfo层** (修改堆内存，PPL不管):
              - ioctl(IsRootDevice=2)→"0"
              - getToken→patch code=0
              - MyGetToken.onResult/MyHtpCallback.onReceive→force code=0
              - isHtpExist→YES, isInitialized→YES
            - **适用环境**: iOS 17.0 未越狱 + 巨魔商店
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
